<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free 3D Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
text-align:center;
overflow-x:hidden;
}

header{
padding:20px;
background:#111;
box-shadow:0 0 20px red;
}

h1{
font-size:40px;
color:#00e5ff;
}

p{
color:#bbb;
margin-top:10px;
}

.hero{
padding:80px 20px;
}

.play{
padding:15px 40px;
font-size:20px;
background:#ff0033;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
transition:.3s;
}

.play:hover{
transform:scale(1.1);
box-shadow:0 0 20px red;
}

.card{
background:#181818;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px #00e5ff;
}

footer{
margin-top:50px;
padding:20px;
background:#111;
color:#888;
}
</style>
</head>

<body>

<header>
<h1>🎮 Free 3D Game</h1>
<p>Ride • Explore • Play</p>
</header>

<section class="hero">
<h2>Indian Bike Style 3D Game</h2>
<br>
<button class="play" onclick="startGame()">▶ Start Game</button>
</section>

<div class="card">
<h2>🏍 Open World</h2>
<p>Ride anywhere in the city.</p>
</div>

<div class="card">
<h2>🚗 Cars & Bikes</h2>
<p>Drive different vehicles.</p>
</div>

<div class="card">
<h2>🏆 Missions</h2>
<p>Complete challenges and earn rewards.</p>
</div>

<footer>
© 2026 Free 3D Game
</footer>

<script>
function startGame(){
alert("Game Coming Soon!");
}
</script>

</body>
</html>
