<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D GTA Style Game</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <button id="open-phone-btn" onclick="toggleMobilePhone()">📱 PHONE</button>

    <div id="phone-container" class="hidden">
        <div class="phone-screen">
            <div class="phone-header">03:00 PM</div>
            <div class="phone-content">
                <p style="font-size:12px; color:#fff; margin-bottom:5px;">9999 = BIKE | 1111 = CAR</p>
                <input type="number" id="cheat-input" placeholder="चिटकोड टाका" pattern="[0-9]*">
                <button onclick="applyCheatCode()">SPAWN VEHICLE</button>
            </div>
        </div>
    </div>

    <div id="mobile-controls">
        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>
        
        <div class="right-cluster">
            <button id="exit-btn" onclick="toggleVehicleDrive()">🚗 ENTER / EXIT</button>
            <button class="ctrl-btn pedal-btn" id="btn-up">▲ RACE / WALK</button>
            <button class="ctrl-btn pedal-btn" id="btn-down">▼ BREAK / BACK</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
