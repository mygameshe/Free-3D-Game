<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Game Screen</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <div id="phone-container" class="hidden">
        <div class="phone-screen">
            <div class="phone-header">01:00 PM</div>
            <div class="phone-content">
                <p>चिटकोड टाका (Cheat Code):</p>
                <input type="text" id="cheat-input" placeholder="उदा. 9999" maxlength="4">
                <button onclick="applyCheatCode()">SPAWN BIKE</button>
            </div>
        </div>
    </div>

    <div id="instructions">
        📱 मोबाईल उघडण्यासाठी/बंद करण्यासाठी <strong>'M'</strong> की दाबा.<br>
        🚶‍♂️ कॅरेक्टर चालवण्यासाठी <strong>Arrow Keys / WASD</strong> वापरा.
    </div>

    <script src="game.js"></script>
</body>
</html>
