<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Game Screen</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <button id="open-phone-btn" onclick="toggleMobilePhone()">📱 OPEN PHONE</button>

    <div id="phone-container" class="hidden">
        <div class="phone-screen">
            <div class="phone-header">02:00 PM</div>
            <div class="phone-content">
                <p>चिटकोड टाका (Cheat Code):</p>
                <input type="number" id="cheat-input" placeholder="उदा. 9999" pattern="[0-9]*">
                <button onclick="applyCheatCode()">SPAWN BIKE</button>
            </div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="control-row">
            <button class="ctrl-btn" id="btn-up">▲</button>
        </div>
        <div class="control-row">
            <button class="ctrl-btn" id="btn-left">◀</button>
            <button class="ctrl-btn" id="btn-down">▼</button>
            <button class="ctrl-btn" id="btn-right">▶</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
